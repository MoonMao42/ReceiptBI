<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#163b31" flood-opacity="0.16"/>
    </filter>
    <clipPath id="screen">
      <rect x="610" y="126" width="610" height="374" rx="12"/>
    </clipPath>
  </defs>

  <rect width="1280" height="640" fill="#f3f5f0"/>
  <circle cx="1168" cy="46" r="160" fill="#dfe9e2"/>
  <circle cx="90" cy="590" r="130" fill="#e8decf"/>

  <g transform="translate(64 58)">
    <rect width="76" height="76" rx="18" fill="#ffffff"/>
    <image href="receiptbi-icon.png" x="8" y="8" width="60" height="60" preserveAspectRatio="xMidYMid meet"/>
    <text x="96" y="51" fill="#153b31" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="700">ReceiptBI</text>
  </g>

  <text x="72" y="214" fill="#153b31" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="38" font-weight="700">
    <tspan x="72" dy="0">让数据调查有依据，</tspan>
    <tspan x="72" dy="56">让结论继续成为报表。</tspan>
  </text>

  <text x="72" y="350" fill="#5a736b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="21">
    <tspan x="72" dy="0">Investigate data. Verify evidence.</tspan>
    <tspan x="72" dy="31">Build editable reports.</tspan>
  </text>

  <g transform="translate(72 444)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="600">
    <rect width="76" height="38" rx="19" fill="#dfe9e2"/>
    <text x="38" y="25" text-anchor="middle" fill="#2c5c4d">CSV</text>
    <rect x="88" width="84" height="38" rx="19" fill="#dfe9e2"/>
    <text x="130" y="25" text-anchor="middle" fill="#2c5c4d">Excel</text>
    <rect x="184" width="154" height="38" rx="19" fill="#dfe9e2"/>
    <text x="261" y="25" text-anchor="middle" fill="#2c5c4d">Read-only DB</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="590" y="106" width="650" height="414" rx="20" fill="#ffffff"/>
    <rect x="610" y="126" width="610" height="374" rx="12" fill="#ffffff"/>
    <image href="demo/03-edit-page-two.png" x="610" y="126" width="610" height="374" preserveAspectRatio="xMidYMid slice" clip-path="url(#screen)"/>
  </g>

  <text x="72" y="574" fill="#688078" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17">Open source · Local first · Desktop and web</text>
</svg>
