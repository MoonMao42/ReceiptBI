name: Desktop Release

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Upload to existing release (e.g. v1.0.0). Leave empty for build-only.'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: desktop-release-${{ inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  create-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Validate desktop release version
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: node apps/desktop/scripts/validate-release-version.mjs --event push --tag "$RELEASE_TAG"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "ReceiptBI Desktop ${{ github.ref_name }}" \
            --draft \
            --notes "$(cat <<'NOTES'
          ## Downloads

          | Platform | File |
          |----------|------|
          | macOS (Apple Silicon) | `.dmg` or `.zip` |
          | macOS (Intel) | `.dmg` or `.zip` |
          | Windows | `.exe` installer |

          ## Install

          ### macOS

          1. Download and open the `.dmg`, then drag ReceiptBI to Applications
          2. First launch will show "app is damaged" — run this in Terminal:
             ```
             xattr -cr /Applications/ReceiptBI.app
             ```
          3. Open ReceiptBI from Applications

          > This happens because the app is not code-signed yet.

          ### Windows

          Run the `.exe` installer and follow the prompts.

          ## Features

          - Investigate business questions across files and read-only databases
          - Prepare working copies without overwriting original files
          - Keep project definitions, corrections, and evidence together
          - Generate traceable reports, tables, and charts
          - 当前提供中文桌面界面
          NOTES
          )"

  build:
    needs: create-release
    if: always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: mac
            arch: arm64
            electron_args: --mac --arm64
          - os: macos-15-intel
            platform: mac
            arch: x64
            electron_args: --mac --x64
          - os: windows-latest
            platform: win
            arch: x64
            electron_args: --win --x64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate desktop build and upload version
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}
        run: node apps/desktop/scripts/validate-release-version.mjs --event "$EVENT_NAME" --tag "$RELEASE_TAG"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install web dependencies
        run: cd apps/web && npm ci

      - name: Install desktop dependencies
        run: cd apps/desktop && npm ci

      # API venv for the build script's requirements fallback
      - name: Setup API venv
        shell: bash
        run: |
          cd apps/api
          python -m venv .venv
          if [ "$RUNNER_OS" = "Windows" ]; then
            .venv/Scripts/pip install -e "."
          else
            .venv/bin/pip install -e "."
          fi

      - name: Build backend
        run: cd apps/desktop && npx tsx scripts/build-pyinstaller.ts
        shell: bash

      - name: Verify runner and backend architecture
        shell: bash
        env:
          EXPECTED_ARCH: ${{ matrix.arch }}
        run: |
          python -c 'import os, platform, sys; normalize=lambda value: "arm64" if value.lower() in {"arm64", "aarch64"} else "x64" if value.lower() in {"x86_64", "amd64", "x64"} else value.lower(); actual=normalize(platform.machine()); expected=os.environ["EXPECTED_ARCH"]; print(f"Runner architecture: {actual} (expected {expected})"); sys.exit(0 if actual == expected else 1)'

          if [ "$RUNNER_OS" = "Windows" ]; then
            backend="apps/desktop/backend/receiptbi-api.exe"
          else
            backend="apps/desktop/backend/receiptbi-api"
          fi

          RECEIPTBI_EXPECTED_ARCH="$EXPECTED_ARCH" "$backend" --self-check

          if [ "$RUNNER_OS" = "macOS" ]; then
            mach_arch="$EXPECTED_ARCH"
            [ "$mach_arch" = "x64" ] && mach_arch="x86_64"
            backend_arches=$(lipo -archs "$backend")
            echo "Backend Mach-O architectures: $backend_arches"
            case " $backend_arches " in
              *" $mach_arch "*) ;;
              *) echo "Backend does not contain expected architecture: $mach_arch"; exit 1 ;;
            esac
          fi

      - name: Build frontend
        run: cd apps/desktop && npx tsx scripts/build-next.ts
        shell: bash

      - name: Compile TypeScript
        run: cd apps/desktop && npx tsc -p tsconfig.electron.json

      - name: Package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: cd apps/desktop && npx electron-builder ${{ matrix.electron_args }} --publish never --config electron-builder.yml
        shell: bash

      - name: Verify release artifact set
        shell: bash
        env:
          EXPECTED_ARCH: ${{ matrix.arch }}
        run: |
          version=$(node -p "require('./apps/desktop/package.json').version")
          release_dir="apps/desktop/release"

          if [ "$RUNNER_OS" = "macOS" ]; then
            artifact_count=$(find "$release_dir" -maxdepth 1 -type f \( -name '*.dmg' -o -name '*.zip' \) | wc -l | tr -d ' ')
            [ "$artifact_count" -eq 2 ] || {
              echo "Expected exactly 2 macOS artifacts, found $artifact_count"
              exit 1
            }
            test -f "$release_dir/ReceiptBI-$version-mac-$EXPECTED_ARCH.dmg"
            test -f "$release_dir/ReceiptBI-$version-mac-$EXPECTED_ARCH.zip"
          elif [ "$RUNNER_OS" = "Windows" ]; then
            artifact_count=$(find "$release_dir" -maxdepth 1 -type f -name '*.exe' | wc -l | tr -d ' ')
            [ "$artifact_count" -eq 1 ] || {
              echo "Expected exactly 1 Windows artifact, found $artifact_count"
              exit 1
            }
            test -f "$release_dir/ReceiptBI-$version-win-$EXPECTED_ARCH.exe"
          fi

      - name: Verify packaged backend
        shell: bash
        env:
          EXPECTED_ARCH: ${{ matrix.arch }}
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            bundled_backend=$(find apps/desktop/release -path '*/resources/backend/receiptbi-api.exe' -type f -print -quit)
          else
            bundled_backend=$(find apps/desktop/release -path '*/ReceiptBI.app/Contents/Resources/backend/receiptbi-api' -type f -print -quit)
          fi

          if [ -z "$bundled_backend" ]; then
            echo "Packaged backend executable was not found"
            exit 1
          fi

          echo "Packaged backend: $bundled_backend"
          RECEIPTBI_EXPECTED_ARCH="$EXPECTED_ARCH" "$bundled_backend" --self-check

          if [ "$RUNNER_OS" = "macOS" ]; then
            mach_arch="$EXPECTED_ARCH"
            [ "$mach_arch" = "x64" ] && mach_arch="x86_64"
            backend_arches=$(lipo -archs "$bundled_backend")
            echo "Packaged backend Mach-O architectures: $backend_arches"
            case " $backend_arches " in
              *" $mach_arch "*) ;;
              *) echo "Packaged backend does not contain expected architecture: $mach_arch"; exit 1 ;;
            esac
          fi

      - name: Verify packaged application architecture
        shell: bash
        env:
          EXPECTED_ARCH: ${{ matrix.arch }}
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            packaged_app=$(find apps/desktop/release -path '*/ReceiptBI.app/Contents/MacOS/ReceiptBI' -type f -print -quit)
            [ -n "$packaged_app" ] || {
              echo "Packaged Electron executable was not found"
              exit 1
            }

            expected_mach_arch="$EXPECTED_ARCH"
            [ "$expected_mach_arch" = "x64" ] && expected_mach_arch="x86_64"
            app_arches=$(lipo -archs "$packaged_app")
            echo "Packaged Electron architectures: $app_arches"
            [ "$app_arches" = "$expected_mach_arch" ] || {
              echo "Packaged Electron executable is not exclusively $expected_mach_arch"
              exit 1
            }
          elif [ "$RUNNER_OS" = "Windows" ]; then
            packaged_app=$(find apps/desktop/release -path '*/win-unpacked/ReceiptBI.exe' -type f -print -quit)
            [ -n "$packaged_app" ] || {
              echo "Packaged Electron executable was not found"
              exit 1
            }

            PACKAGED_APP="$packaged_app" python - <<'PY'
          import os
          import struct
          import sys

          path = os.environ["PACKAGED_APP"]
          with open(path, "rb") as executable:
              executable.seek(0x3C)
              pe_offset_bytes = executable.read(4)
              if len(pe_offset_bytes) != 4:
                  raise SystemExit("Invalid PE executable: missing PE offset")
              pe_offset = struct.unpack("<I", pe_offset_bytes)[0]
              executable.seek(pe_offset)
              if executable.read(4) != b"PE\0\0":
                  raise SystemExit("Invalid PE executable signature")
              machine = struct.unpack("<H", executable.read(2))[0]

          expected_machine = 0x8664
          print(f"Packaged Electron PE machine: 0x{machine:04x}")
          sys.exit(0 if machine == expected_machine else 1)
          PY
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.exe
          if-no-files-found: error
          retention-days: 7

  publish-release-assets:
    needs: build
    if: needs.build.result == 'success' && (startsWith(github.ref, 'refs/tags/desktop-v') || inputs.release_tag != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download verified build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: release-assets
          merge-multiple: true

      - name: Verify complete release artifact set
        shell: bash
        run: |
          version=$(node -p "require('./apps/desktop/package.json').version")
          expected=(
            "ReceiptBI-$version-mac-arm64.dmg"
            "ReceiptBI-$version-mac-arm64.zip"
            "ReceiptBI-$version-mac-x64.dmg"
            "ReceiptBI-$version-mac-x64.zip"
            "ReceiptBI-$version-win-x64.exe"
          )

          artifact_count=$(find release-assets -maxdepth 1 -type f | wc -l | tr -d ' ')
          [ "$artifact_count" -eq "${#expected[@]}" ] || {
            echo "Expected ${#expected[@]} release artifacts, found $artifact_count"
            find release-assets -maxdepth 1 -type f -print
            exit 1
          }

          for filename in "${expected[@]}"; do
            test -s "release-assets/$filename" || {
              echo "Missing or empty release artifact: $filename"
              exit 1
            }
          done

          (
            cd release-assets
            sha256sum "${expected[@]}" | tee SHA256SUMS
          )

      - name: Replace draft release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
        run: |
          release_json=$(gh release view "$RELEASE_TAG" \
            --repo "${{ github.repository }}" \
            --json databaseId,isDraft)
          release_id=$(printf '%s' "$release_json" | jq -r '.databaseId')
          is_draft=$(printf '%s' "$release_json" | jq -r '.isDraft')

          [ "$is_draft" = "true" ] || {
            echo "Refusing to replace assets on a published release"
            exit 1
          }

          for file in release-assets/*.dmg release-assets/*.zip release-assets/*.exe; do
            [ -f "$file" ] || continue
            filename=$(basename "$file")
            filesize=$(wc -c < "$file" | tr -d ' ')
            local_digest="sha256:$(sha256sum "$file" | awk '{print $1}')"
            echo "Uploading $filename ($filesize bytes)..."

            assets_json=$(gh api "repos/${{ github.repository }}/releases/$release_id/assets?per_page=100")
            existing=$(printf '%s' "$assets_json" | jq -r --arg name "$filename" \
              '.[] | select(.name == $name) | .id')
            if [ -n "$existing" ]; then
              gh api --method DELETE "repos/${{ github.repository }}/releases/assets/$existing"
            fi

            encoded_name=$(jq -rn --arg value "$filename" '$value | @uri')
            response_file=$(mktemp)
            http_code=$(curl --silent --show-error \
              --output "$response_file" \
              --write-out '%{http_code}' \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --upload-file "$file" \
              "https://uploads.github.com/repos/${{ github.repository }}/releases/$release_id/assets?name=$encoded_name")

            uploaded_id=$(jq -r '.id // empty' "$response_file")
            uploaded_size=$(jq -r '.size // 0' "$response_file")
            uploaded_digest=$(jq -r '.digest // empty' "$response_file")
            rm -f "$response_file"

            if [ "$http_code" != "201" ] || [ "$uploaded_size" != "$filesize" ] || [ "$uploaded_digest" != "$local_digest" ]; then
              [ -n "$uploaded_id" ] && gh api --method DELETE \
                "repos/${{ github.repository }}/releases/assets/$uploaded_id"
              echo "Upload verification failed for $filename"
              exit 1
            fi
          done

      - name: Verify draft release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
        run: |
          release_json=$(gh release view "$RELEASE_TAG" \
            --repo "${{ github.repository }}" \
            --json databaseId)
          release_id=$(printf '%s' "$release_json" | jq -r '.databaseId')
          assets_json=$(gh api "repos/${{ github.repository }}/releases/$release_id/assets?per_page=100")
          version=$(node -p "require('./apps/desktop/package.json').version")
          expected=(
            "ReceiptBI-$version-mac-arm64.dmg"
            "ReceiptBI-$version-mac-arm64.zip"
            "ReceiptBI-$version-mac-x64.dmg"
            "ReceiptBI-$version-mac-x64.zip"
            "ReceiptBI-$version-win-x64.exe"
          )

          [ "$(printf '%s' "$assets_json" | jq 'length')" -eq "${#expected[@]}" ] || {
            echo "Draft release does not contain exactly ${#expected[@]} assets"
            exit 1
          }

          for filename in "${expected[@]}"; do
            remote_size=$(printf '%s' "$assets_json" | jq -r --arg name "$filename" \
              '.[] | select(.name == $name) | .size')
            remote_digest=$(printf '%s' "$assets_json" | jq -r --arg name "$filename" \
              '.[] | select(.name == $name) | .digest')
            local_size=$(wc -c < "release-assets/$filename" | tr -d ' ')
            local_digest="sha256:$(sha256sum "release-assets/$filename" | awk '{print $1}')"

            [ "$remote_size" = "$local_size" ] && [ "$remote_digest" = "$local_digest" ] || {
              echo "Final release verification failed for $filename"
              exit 1
            }
          done
