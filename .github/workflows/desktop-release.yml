name: Desktop Release

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Upload to existing release (e.g. v1.0.0). Leave empty for build-only.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    steps:
      - uses: actions/checkout@v4
      - name: Validate desktop release version
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: node apps/desktop/scripts/validate-release-version.mjs --event push --tag "$RELEASE_TAG"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "ReceiptBI Desktop ${{ github.ref_name }}" \
            --draft \
            --notes "$(cat <<'NOTES'
          ## Downloads

          | Platform | File |
          |----------|------|
          | macOS (Apple Silicon) | `.dmg` or `.zip` |
          | macOS (Intel) | `.dmg` or `.zip` |
          | Windows | `.exe` installer |

          ## Install

          ### macOS

          1. Download and open the `.dmg`, then drag ReceiptBI to Applications
          2. First launch will show "app is damaged" — run this in Terminal:
             ```
             xattr -cr /Applications/ReceiptBI.app
             ```
          3. Open ReceiptBI from Applications

          > This happens because the app is not code-signed yet.

          ### Windows

          Run the `.exe` installer and follow the prompts.

          ## Features

          - Investigate business questions across files and read-only databases
          - Prepare working copies without overwriting original files
          - Keep project definitions, corrections, and evidence together
          - Generate traceable reports, tables, and charts
          - 当前提供中文桌面界面
          NOTES
          )"

  build:
    needs: create-release
    if: always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: mac
            arch: arm64
            electron_args: --mac --arm64
          - os: macos-15-intel
            platform: mac
            arch: x64
            electron_args: --mac --x64
          - os: windows-latest
            platform: win
            arch: x64
            electron_args: --win --x64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate desktop build and upload version
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}
        run: node apps/desktop/scripts/validate-release-version.mjs --event "$EVENT_NAME" --tag "$RELEASE_TAG"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install web dependencies
        run: cd apps/web && npm ci

      - name: Install desktop dependencies
        run: cd apps/desktop && npm ci

      # API venv for the build script's requirements fallback
      - name: Setup API venv
        shell: bash
        run: |
          cd apps/api
          python -m venv .venv
          if [ "$RUNNER_OS" = "Windows" ]; then
            .venv/Scripts/pip install -e "."
          else
            .venv/bin/pip install -e "."
          fi

      - name: Build backend
        run: cd apps/desktop && npx tsx scripts/build-pyinstaller.ts
        shell: bash

      - name: Verify runner and backend architecture
        shell: bash
        env:
          EXPECTED_ARCH: ${{ matrix.arch }}
        run: |
          python -c 'import os, platform, sys; normalize=lambda value: "arm64" if value.lower() in {"arm64", "aarch64"} else "x64" if value.lower() in {"x86_64", "amd64", "x64"} else value.lower(); actual=normalize(platform.machine()); expected=os.environ["EXPECTED_ARCH"]; print(f"Runner architecture: {actual} (expected {expected})"); sys.exit(0 if actual == expected else 1)'

          if [ "$RUNNER_OS" = "Windows" ]; then
            backend="apps/desktop/backend/receiptbi-api.exe"
          else
            backend="apps/desktop/backend/receiptbi-api"
          fi

          RECEIPTBI_EXPECTED_ARCH="$EXPECTED_ARCH" "$backend" --self-check

          if [ "$RUNNER_OS" = "macOS" ]; then
            mach_arch="$EXPECTED_ARCH"
            [ "$mach_arch" = "x64" ] && mach_arch="x86_64"
            backend_arches=$(lipo -archs "$backend")
            echo "Backend Mach-O architectures: $backend_arches"
            case " $backend_arches " in
              *" $mach_arch "*) ;;
              *) echo "Backend does not contain expected architecture: $mach_arch"; exit 1 ;;
            esac
          fi

      - name: Build frontend
        run: cd apps/desktop && npx tsx scripts/build-next.ts
        shell: bash

      - name: Compile TypeScript
        run: cd apps/desktop && npx tsc -p tsconfig.electron.json

      - name: Package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: cd apps/desktop && npx electron-builder ${{ matrix.electron_args }} --publish never --config electron-builder.yml
        shell: bash

      - name: Verify packaged backend
        shell: bash
        env:
          EXPECTED_ARCH: ${{ matrix.arch }}
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            bundled_backend=$(find apps/desktop/release -path '*/resources/backend/receiptbi-api.exe' -type f -print -quit)
          else
            bundled_backend=$(find apps/desktop/release -path '*/ReceiptBI.app/Contents/Resources/backend/receiptbi-api' -type f -print -quit)
          fi

          if [ -z "$bundled_backend" ]; then
            echo "Packaged backend executable was not found"
            exit 1
          fi

          echo "Packaged backend: $bundled_backend"
          RECEIPTBI_EXPECTED_ARCH="$EXPECTED_ARCH" "$bundled_backend" --self-check

          if [ "$RUNNER_OS" = "macOS" ]; then
            mach_arch="$EXPECTED_ARCH"
            [ "$mach_arch" = "x64" ] && mach_arch="x86_64"
            backend_arches=$(lipo -archs "$bundled_backend")
            echo "Packaged backend Mach-O architectures: $backend_arches"
            case " $backend_arches " in
              *" $mach_arch "*) ;;
              *) echo "Packaged backend does not contain expected architecture: $mach_arch"; exit 1 ;;
            esac
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.exe
          if-no-files-found: error
          retention-days: 7

      # Upload directly to release via GitHub API (gh CLI truncates large files)
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/desktop-v') || inputs.release_tag != ''
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Determine which release to upload to
          if [ -n "${{ inputs.release_tag }}" ]; then
            RELEASE_TAG="${{ inputs.release_tag }}"
          else
            RELEASE_TAG="${{ github.ref_name }}"
          fi
          echo "Target release: $RELEASE_TAG"

          RELEASE_ID=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            | jq -r --arg tag "$RELEASE_TAG" '.[] | select(.tag_name == $tag) | .id' | head -1)

          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "Release not found for tag: $RELEASE_TAG"
            exit 1
          fi
          echo "Release ID: $RELEASE_ID"

          for file in apps/desktop/release/*.dmg apps/desktop/release/*.zip apps/desktop/release/*.exe; do
            [ -f "$file" ] || continue
            filename=$(basename "$file")
            filesize=$(wc -c < "$file" | tr -d ' ')
            echo "Uploading $filename ($filesize bytes)..."

            # Delete existing asset if any
            existing=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets" \
              | jq -r ".[] | select(.name == \"$filename\") | .id")
            if [ -n "$existing" ]; then
              curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" \
                "https://api.github.com/repos/${{ github.repository }}/releases/assets/$existing"
              echo "  Deleted existing asset"
            fi

            uploaded=false
            for attempt in 1 2 3; do
              # Use --upload-file which is designed for reliable binary uploads
              response=$(curl -s -w "\n%{http_code}" \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Content-Type: application/octet-stream" \
                --upload-file "$file" \
                "https://uploads.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets?name=$filename")
              http_code=$(echo "$response" | tail -1)
              body=$(echo "$response" | sed '$d')
              uploaded_size=$(echo "$body" | jq -r '.size // 0')

              if [ "$http_code" = "201" ] && [ "$uploaded_size" = "$filesize" ]; then
                echo "  OK (verified: $uploaded_size bytes)"
                uploaded=true
                break
              fi
              echo "  Attempt $attempt: HTTP $http_code, uploaded=$uploaded_size expected=$filesize"
              # Clean up partial upload
              new_asset=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
                "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets" \
                | jq -r ".[] | select(.name == \"$filename\") | .id")
              [ -n "$new_asset" ] && curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" \
                "https://api.github.com/repos/${{ github.repository }}/releases/assets/$new_asset"
              sleep 10
            done

            if [ "$uploaded" != "true" ]; then
              echo "Failed to upload $filename after 3 attempts"
              exit 1
            fi
          done
