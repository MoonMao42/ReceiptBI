name: Integration

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "**/*.md"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend-integration:
    name: Backend Integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: receiptbi
          POSTGRES_PASSWORD: receiptbi
          POSTGRES_DB: receiptbi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U receiptbi -d receiptbi_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: receiptbi_test
          MYSQL_USER: receiptbi
          MYSQL_PASSWORD: receiptbi
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ureceiptbi -preceiptbi"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install dependencies
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Start mock LLM gateway
        run: |
          python scripts/mock_llm_gateway.py > mock-llm.log 2>&1 &
          echo $! > /tmp/mock-llm.pid
          python - <<'PY'
          import time
          import urllib.request

          for _ in range(30):
              try:
                  with urllib.request.urlopen("http://127.0.0.1:4010/health", timeout=2):
                      break
              except Exception:
                  time.sleep(1)
          else:
              raise SystemExit("Mock LLM gateway failed to become healthy")
          PY

      - name: Run integration tests
        working-directory: apps/api
        env:
          RECEIPTBI_TEST_PG_HOST: 127.0.0.1
          RECEIPTBI_TEST_PG_PORT: "5432"
          RECEIPTBI_TEST_PG_USER: receiptbi
          RECEIPTBI_TEST_PG_PASSWORD: receiptbi
          RECEIPTBI_TEST_PG_DATABASE: receiptbi_test
          RECEIPTBI_TEST_MYSQL_HOST: 127.0.0.1
          RECEIPTBI_TEST_MYSQL_PORT: "3306"
          RECEIPTBI_TEST_MYSQL_USER: receiptbi
          RECEIPTBI_TEST_MYSQL_PASSWORD: receiptbi
          RECEIPTBI_TEST_MYSQL_DATABASE: receiptbi_test
          RECEIPTBI_TEST_MODEL_BASE_URL: http://127.0.0.1:4010/v1
          ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS0zMmJ5dGVz
        run: pytest tests/test_config_integration.py -v

      - name: Upload mock gateway log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-integration-mock-llm-log
          path: mock-llm.log
          if-no-files-found: ignore

  docker-e2e:
    name: Docker E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build and start Docker stack
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --build

      - name: Wait for frontend and backend
        run: |
          wait_for_url() {
            url="$1"
            for _ in $(seq 1 60); do
              if curl --connect-timeout 2 --max-time 5 -fsS "$url" >/dev/null; then
                return 0
              fi
              sleep 2
            done
            echo "Timed out waiting for $url" >&2
            return 1
          }
          for url in http://127.0.0.1:8000/health http://127.0.0.1:3000/health; do
            wait_for_url "$url"
          done

      - name: Install Playwright browser
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke test
        working-directory: apps/web
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
        run: npm run test:e2e

      - name: Collect Docker logs
        if: always()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color > docker-compose.integration.log || true

      - name: Upload Docker and Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: docker-e2e-artifacts
          path: |
            docker-compose.integration.log
            apps/web/playwright-report
            apps/web/test-results
          if-no-files-found: ignore

      - name: Shutdown Docker stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v --remove-orphans

  start-sh-smoke:
    name: start.sh Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/api/pyproject.toml

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Write CI env files
        run: |
          cat > apps/api/.env <<'EOF'
          DATABASE_URL=sqlite+aiosqlite:///./data/receiptbi.db
          ENCRYPTION_KEY=dGVzdC1lbmNyeXB0aW9uLWtleS0zMmJ5dGVz
          EOF
          cat > apps/web/.env.local <<'EOF'
          NEXT_PUBLIC_API_URL=http://127.0.0.1:8000
          INTERNAL_API_URL=http://127.0.0.1:8000
          EOF

      - name: Setup workspace
        run: RECEIPTBI_NO_BROWSER=1 ./start.sh setup

      - name: Doctor
        run: RECEIPTBI_NO_BROWSER=1 ./start.sh doctor

      - name: Start backend
        run: RECEIPTBI_NO_BROWSER=1 ./start.sh backend

      - name: Start frontend
        run: RECEIPTBI_NO_BROWSER=1 ./start.sh frontend

      - name: Wait for services
        run: |
          wait_for_url() {
            url="$1"
            for _ in $(seq 1 60); do
              if curl --connect-timeout 2 --max-time 5 -fsS "$url" >/dev/null; then
                return 0
              fi
              sleep 2
            done
            echo "Timed out waiting for $url" >&2
            return 1
          }
          for url in http://127.0.0.1:8000/health http://127.0.0.1:3000/health; do
            wait_for_url "$url"
          done
          curl --connect-timeout 2 --max-time 30 -fsS http://127.0.0.1:3000 >/dev/null

      - name: Status
        run: ./start.sh status

      - name: Upload host smoke logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: start-sh-smoke-${{ matrix.os }}
          path: |
            logs/backend.log
            logs/frontend.log
          if-no-files-found: ignore

      - name: Stop services
        if: always()
        run: ./start.sh stop

  integration-success:
    name: Integration Success
    needs: [backend-integration, docker-e2e, start-sh-smoke]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify integration jobs
        run: |
          if [ "${{ needs.backend-integration.result }}" != "success" ] || \
             [ "${{ needs.docker-e2e.result }}" != "success" ] || \
             [ "${{ needs.start-sh-smoke.result }}" != "success" ]; then
            echo "At least one integration job failed"
            exit 1
          fi
          echo "✅ All integration checks passed!"
