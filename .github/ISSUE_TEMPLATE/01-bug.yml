name: Bug report / 问题报告
description: Report a reproducible problem / 报告可以复现的问题
title: "[Bug] "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve ReceiptBI. Please describe one problem per report.
        感谢反馈。每份报告请只描述一个问题。

  - type: textarea
    id: summary
    attributes:
      label: Problem summary / 问题概述
      description: What went wrong?
      placeholder: A short description of the problem
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area / 相关功能
      options:
        - Installation or update / 安装或更新
        - Data import or connection / 数据导入或连接
        - Analysis / 数据分析
        - Semantic governance / 语义治理
        - Reports or export / 报表或导出
        - Desktop application / 桌面应用
        - Other / 其他
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce / 复现步骤
      placeholder: |
        1. Open ...
        2. Select ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected result / 预期结果
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual result / 实际结果
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: ReceiptBI version
      placeholder: "For example: 1.0.0"
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment / 运行环境
      description: Operating system and version
      placeholder: "For example: macOS 15.5 (Apple Silicon)"
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Screenshots or logs / 截图或日志
      description: Add only what is needed to understand the problem.
      placeholder: Drag files here or paste relevant text

  - type: checkboxes
    id: checks
    attributes:
      label: Checks / 提交前确认
      options:
        - label: I searched existing issues for the same problem. / 我已搜索过现有 Issue。
          required: true
        - label: I removed credentials, personal data, and private datasets. / 我已移除凭据、个人信息和私有数据。
          required: true
