appId: com.receiptbi.desktop
productName: ReceiptBI
copyright: Copyright © 2024-2026 ReceiptBI Team

directories:
  output: release
  buildResources: resources

files:
  - dist-electron/**/*

extraMetadata:
  main: dist-electron/main.js

# 将 backend 和 next 作为额外资源打包（不进入 asar）
extraResources:
  - from: resources/icon/icon.png
    to: icon/icon.png
  - from: backend
    to: backend
    filter:
      - "**/*"
      - "!_internal/data${/*}"
      - "!data${/*}"
      - "!**/projects${/*}"
      - "!**/backups${/*}"
      - "!**/.python${/*}"
      - "!**/.env"
      - "!**/.env.*"
      - "!**/*.{db,sqlite,sqlite3}"
      - "!**/*.{db,sqlite,sqlite3}-{journal,shm,wal}"
      - "!**/*.{ddb,duckdb}"
      - "!**/*.{ddb,duckdb}.wal"
  - from: next
    to: next
    filter:
      - "**/*"
      - "!**/.env"
      - "!**/.env.*"
      - "!**/*.{db,sqlite,sqlite3}"
      - "!**/*.{db,sqlite,sqlite3}-{journal,shm,wal}"
      - "!**/*.{ddb,duckdb}"
      - "!**/*.{ddb,duckdb}.wal"

# macOS
mac:
  category: public.app-category.business
  target:
    - dmg
    - zip
  artifactName: ${productName}-${version}-mac-${arch}.${ext}
  icon: resources/icon/icon.icns
  sign: false
  hardenedRuntime: false

# Windows
win:
  target:
    - nsis
  artifactName: ${productName}-${version}-win-${arch}.${ext}
  icon: resources/icon/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  createDesktopShortcut: true
  createStartMenuShortcut: true

# Linux (optional)
linux:
  target: [AppImage]
  category: Office
  artifactName: ${productName}-${version}-linux-${arch}.${ext}
  icon: resources/icon/icon.png

# ASAR: 只包含 dist-electron
asar: true

# DMG
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
